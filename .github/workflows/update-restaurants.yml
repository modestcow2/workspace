name: 식당 데이터 주간 업데이트

on:
  schedule:
    - cron: '0 3 * * 1'  # 매주 월요일 12:00 KST (UTC 03:00)
  workflow_dispatch:       # 수동 트리거

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: restaurant-finder/scripts

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: restaurant-finder/scripts/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: 현재 data.js 백업
        run: |
          mkdir -p backups
          cp ../js/data.js backups/data_$(date +%Y-%m-%d).js || true

      - name: 네이버 검색 수집 (raw 데이터 갱신)
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: node collect-restaurants.js

      - name: 하이브리드 수집 (카카오 + 네이버 통합)
        env:
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
        run: node collect-hybrid.js

      - name: 변경 감지
        run: node detect-changes.js

      - name: 변경 여부 확인
        id: check
        run: |
          if [ "$(cat has-changes.txt)" = "true" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: 변경 리포트 읽기
        if: steps.check.outputs.has_changes == 'true'
        id: report
        run: |
          {
            echo 'body<<EOF'
            cat change-report.md
            echo ''
            echo '---'
            echo '🤖 자동 생성 by GitHub Actions'
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: PR 생성
        if: steps.check.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: '식당 데이터 자동 업데이트'
          title: '🍽️ 식당 데이터 주간 업데이트'
          body: ${{ steps.report.outputs.body }}
          branch: auto/update-restaurants
          delete-branch: true
          labels: data-update,automated
