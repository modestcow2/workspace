<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KPC 오늘 뭐 먹지?</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css" />
  <!-- Kakao Maps SDK -->
  <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=0dda0cbc363dcd57397d5985374c133d&libraries=clusterer"></script>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-50 text-gray-900">

  <!-- Header -->
  <header class="bg-white shadow-sm sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
      <div>
        <h1 class="text-lg sm:text-xl font-bold text-indigo-700">🍽️ KPC 오늘 뭐 먹지?</h1>
        <p class="text-xs text-gray-400">한국생산성본부 기준 반경 1.5km 이내 식당</p>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-xs font-semibold bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full whitespace-nowrap">📍 경복궁역</span>
        <a id="admin-link" href="admin.html" class="admin-link-btn" style="display:none">
          🛠️ 관리자
          <span id="pending-badge" class="pending-badge" style="display:none">0</span>
        </a>
        <button id="auth-login-btn" class="text-xs text-gray-400 hover:text-indigo-500 transition-colors">로그인</button>
        <span id="auth-user-info" class="text-xs text-gray-400" style="display:none"></span>
        <button id="auth-logout-btn" class="text-xs text-gray-400 hover:text-red-400 transition-colors" style="display:none">로그아웃</button>
      </div>
    </div>
  </header> 

  <main class="max-w-7xl mx-auto px-4 py-6">

    <!-- Search Bar -->
    <div class="search-wrapper mb-4">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" class="form-input search-input" placeholder="식당 이름 또는 메뉴로 검색..." />
      <button id="search-clear" class="search-clear" style="display:none">&times;</button>
    </div>

    <!-- Filter Panel -->
    <section id="filter-panel" class="bg-white rounded-xl shadow-sm p-4 mb-4">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-sm font-semibold text-gray-700">필터</h2>
        <button id="reset-btn" class="text-xs text-gray-400 hover:text-red-500 transition-colors" style="display:none">
          전체 초기화
        </button>
      </div>
      <!-- 필터 뱃지 그룹은 JS에서 렌더링 -->
    </section>

    <!-- Active Filter Chips -->
    <div id="active-filters" class="flex flex-wrap gap-2 mb-4" style="display:none"></div>

    <!-- Summary + View Toggle + Buttons -->
    <div class="flex items-center justify-between mb-4 gap-3 flex-wrap">
      <div class="flex items-center gap-3">
        <div class="view-toggle">
          <button id="view-map-btn" class="view-toggle-btn active" type="button">🗺️ 지도</button>
          <button id="view-list-btn" class="view-toggle-btn" type="button">📋 리스트</button>
        </div>
        <p id="result-summary" class="text-sm text-gray-500"></p>
      </div>
      <div class="flex items-center gap-2">
        <select id="sort-select" class="sort-select">
          <option value="default">정렬: 기본</option>
          <option value="distance">거리순</option>
          <option value="name">이름순</option>
          <option value="price-asc">가격 낮은순</option>
          <option value="price-desc">가격 높은순</option>
        </select>
        <button id="random-pick-btn"
          class="random-pick-btn" type="button">
          🎲 오늘 뭐 먹지?
        </button>
        <button id="add-restaurant-btn"
          class="flex items-center gap-1 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-4 py-2 rounded-lg transition-colors shadow-sm whitespace-nowrap">
          + 식당 추가
        </button>
      </div>
    </div>

    <!-- Map Container -->
    <div id="map-container" style="display:none">
      <div id="kakao-map"></div>
    </div>

    <!-- Content Grid -->
    <div id="restaurant-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    <div id="empty-state" style="display:none" class="text-center py-16 text-gray-400">
      <p class="text-5xl mb-3">🔍</p>
      <p class="text-base font-medium">조건에 맞는 식당이 없습니다</p>
      <p class="text-sm mt-1">다른 필터를 선택해보세요</p>
    </div>
    <div id="pagination" class="flex justify-center items-center gap-2 mt-6 mb-4"></div>
  </main>

  <!-- 식당 추가 모달 -->
  <div id="modal-overlay" class="fixed inset-0 bg-black/50 z-50 items-center justify-center p-4" style="display:none">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
      <div class="p-5 sm:p-6">

        <div class="flex items-center justify-between mb-5">
          <h2 id="modal-title" class="text-lg font-bold">🍴 식당 직접 등록</h2>
          <button id="modal-close" class="text-gray-400 hover:text-gray-700 text-3xl leading-none">&times;</button>
        </div>

        <form id="add-form" novalidate>

          <div class="form-group">
            <label class="form-label">식당 이름 <span class="text-red-500">*</span></label>
            <input type="text" name="restaurantName" class="form-input" placeholder="예: 광화문 파스타" required />
          </div>

          <div class="form-group">
            <label class="form-label">주소 <span class="text-red-500">*</span></label>
            <input type="text" name="address" class="form-input" placeholder="예: 서울 종로구 새문안로 32" required />
          </div>

          <!-- 좌표 (관리자만 표시) -->
          <div id="coord-section" style="display:none">
            <div class="bg-blue-50 border border-blue-200 rounded-lg p-3 mb-4 text-xs text-blue-700 leading-relaxed">
              <p class="font-bold mb-1.5">📌 좌표(위도·경도) 찾는 방법</p>
              <ol class="list-decimal list-inside space-y-0.5">
                <li><strong>Google Maps</strong>에서 식당 검색 후 마커를 우클릭</li>
                <li>좌표 숫자를 클릭하면 클립보드에 자동 복사됨</li>
                <li>또는 <strong>Naver지도</strong> URL 파라미터에서 확인 가능</li>
              </ol>
            </div>
            <div class="grid grid-cols-2 gap-3 mb-4">
              <div>
                <label class="form-label">위도 (Latitude)</label>
                <input type="number" name="lat" class="form-input" placeholder="37.5796" step="any" />
              </div>
              <div>
                <label class="form-label">경도 (Longitude)</label>
                <input type="number" name="lng" class="form-input" placeholder="126.9770" step="any" />
              </div>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">
              대표 메뉴 <span class="text-red-500">*</span>
              <span class="font-normal text-gray-400 ml-1">(쉼표로 구분)</span>
            </label>
            <input type="text" name="mainMenu" class="form-input" placeholder="예: 비빔밥, 된장찌개, 불고기" required />
          </div>

          <div class="grid grid-cols-2 gap-3 mb-4">
            <div>
              <label class="form-label">가격대</label>
              <select name="priceRange" class="form-input bg-white">
                <option value="₩">₩ 1만원 미만</option>
                <option value="₩₩" selected>₩₩ 1만원대</option>
                <option value="₩₩₩">₩₩₩ 2만원대</option>
                <option value="₩₩₩₩">₩₩₩₩ 3만원 이상</option>
              </select>
            </div>
            <div>
              <label class="form-label">영업시간</label>
              <input type="text" name="openHours" class="form-input" placeholder="11:00~21:00" />
            </div>
          </div>

          <!-- 태그 선택 -->
          <div class="mb-4">
            <label class="form-label mb-2">
              태그 선택
              <span class="font-normal text-gray-400">(복수 선택 가능)</span>
            </label>
            <div id="tag-selector" class="space-y-3"></div>
          </div>

          <div class="form-group">
            <label class="form-label">한 줄 특징 <span class="font-normal text-gray-400">(선택)</span></label>
            <input type="text" name="tip" class="form-input" placeholder="이 식당의 특징을 간단히..." />
          </div>

          <!-- 제안자 정보 (비관리자용) -->
          <div id="suggestion-fields" style="display:none">
            <div id="suggestion-notice" class="bg-amber-50 border border-amber-200 rounded-lg p-3 mb-4 text-xs text-amber-700">
              📝 식당 추가제안은 관리자 승인 후 반영됩니다.
            </div>
            <div class="form-group">
              <label class="form-label">닉네임 <span class="text-red-500">*</span></label>
              <input type="text" name="nickname" class="form-input" placeholder="닉네임을 입력하세요" />
            </div>
            <div class="form-group">
              <label class="form-label">수정 이유 <span class="text-red-500">*</span></label>
              <textarea name="reason" class="form-input" rows="2" placeholder="왜 수정/추가가 필요한지 간단히 적어주세요"></textarea>
            </div>
          </div>

          <div class="flex gap-3 pt-2">
            <button type="button" id="modal-cancel"
              class="flex-1 py-2.5 border border-gray-300 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-50 transition-colors">
              취소
            </button>
            <button type="submit" id="modal-submit-btn"
              class="flex-1 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-bold transition-colors">
              등록하기
            </button>
          </div>

        </form>
      </div>
    </div>
  </div>

  <!-- 랜덤 추천 모달 -->
  <div id="random-modal" class="fixed inset-0 bg-black/50 z-50 items-center justify-center p-4" style="display:none">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm">
      <div class="p-5 text-center">
        <p class="text-4xl mb-3" id="random-emoji">🎲</p>
        <h3 class="text-lg font-bold mb-1" id="random-name"></h3>
        <p class="text-xs text-gray-400 mb-3" id="random-address"></p>
        <div class="flex justify-center gap-3 text-sm text-gray-500 mb-3">
          <span id="random-distance"></span>
          <span>·</span>
          <span id="random-price"></span>
          <span>·</span>
          <span id="random-hours"></span>
        </div>
        <p class="text-sm text-gray-700 mb-2" id="random-menu"></p>
        <p class="tip-text mb-4" id="random-tip" style="display:none"></p>
        <div class="flex gap-3">
          <button id="random-retry" class="flex-1 py-2.5 border border-gray-300 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-50 transition-colors">
            🎲 다시 뽑기
          </button>
          <button id="random-accept" class="flex-1 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-bold transition-colors">
            🍽️ 이걸로!
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast" style="display:none"></div>

  <!-- 삭제 제안 모달 -->
  <div id="delete-suggest-modal" class="fixed inset-0 bg-black/50 z-50 items-center justify-center p-4" style="display:none">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm">
      <div class="p-5">
        <h3 class="text-lg font-bold mb-3">🗑️ 삭제 제안</h3>
        <p id="delete-suggest-name" class="text-sm text-gray-600 mb-3"></p>
        <div class="form-group">
          <label class="form-label">닉네임 <span class="text-red-500">*</span></label>
          <input type="text" id="delete-nickname" class="form-input" placeholder="닉네임" />
        </div>
        <div class="form-group">
          <label class="form-label">삭제 이유 <span class="text-red-500">*</span></label>
          <textarea id="delete-reason" class="form-input" rows="2" placeholder="삭제 이유를 적어주세요"></textarea>
        </div>
        <div class="flex gap-3 pt-2">
          <button id="delete-suggest-cancel" class="flex-1 py-2.5 border border-gray-300 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-50 transition-colors">취소</button>
          <button id="delete-suggest-submit" class="flex-1 py-2.5 bg-red-500 hover:bg-red-600 text-white rounded-lg text-sm font-bold transition-colors">삭제 제안</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/firestore-service.js"></script>
  <script src="js/map-view.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
